version: "3.9"

services:
  bank-teller-butler:
    build: .
    container_name: bank-teller-butler
    ports:
      - "8100:8100"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - PORT=8100
    volumes:
      - ./data:/app/data:ro
    restart: unless-stopped
